<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas 4 - JavaScript</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 550px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .header{
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header img{
            width: 60px; 
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #aaa;
        }

        /*setiap step dibungkus dalam section*/
        .step{
            border: 1px solid #ccc;
            padding: 16px;
            margin-bottom: 16px;
        }

        /*baris label dan input*/
        .row{
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }
    </style>
</head>
<body>
    <!-----HEADER IDENTITAS-------->
    <div class="header">
        <img src="----" alt="Foto"/>
        <div>
            <b>Nama: Michael Angelo</b><br>
            NIM: 245314003<br>
            Tugas: Tugas 4 - JavaScript DOM
        </div>
    </div>

    <!----1.--Nama dan Jumlah------->
    <div class="step" id="step1">
        <div class="row">
            <label>Nama: </label>
            <input type="text" id="input-nama" placeholder="Teks Nama"/>
        </div>
        <div class="row">
            <label>Jumlah Pilihan: </label>
            <input type="text" id="input-jumlah" placeholder="angka" style="width: 60px;flex: none;"/>
        </div>
        <div class="error-msg" id="err-step1"></div>
        <button onclick="okStep1()">OK</button>
    </div>

    <!-----2.--Input teks pilihan--------->
    <div class="step hidden" id="step2">
        <div id="container-pilihan">

        </div>
        <div class="error-msg" id="err-step2"></div>
        <button onclick="okStep2()">OK</button>
    </div>

    <!----3.---Radio Button + Dropdown---------->
    <div class="step hidden" id="step3">
        <p style="font-size: 14px; margin-bottom: 8px;">Pilihan: </p>

        <div class="radio-list" id="container-radio"></div>

        <div class="row" style="margin-top: 10px;">
            <label>Atau Dropdown: </label>
            <select id="select-pilihan"></select>
        </div>

        <div class="error-msg" id="err-step3"></div>
        <button onclick="okStep3()">OK</button>
    </div>

    <!----4.--Input email----->
    
    <div class="step hidden" id="step4">
        <div class="row">
            <label>Email: </label>
            <input type="text" id="input-email" placeholder="email@domain.com"/>
        </div>
        <div class="error-msg" id="err-step4"></div>
        <button onclick="okStep4()">OK</button>
    </div>

    <!-----OUTPUT AKHIR----->
    <div id="output-akhir" class="hidden"></div>


    <!----JAVASCRIPT----->
    <script>
        //variabel disetiap step
        var dataNama= "";
        var dataJumlah= 0;
        var arrayPilihan = []; //array untuk menyimpan teks pilihan
        var dataPilihan = ""; //pilihan yang dipilih user

        //Step1 validasi nama dan jumlah, lalu buat input pilihan
        function okStep1() {
            var nama = document.getElementById("input-nama").value.trim();
            var jumlah = document.getElementById("input-jumlah").value.trim();
            var err = document.getElementById("err-step1");

            //error trapping
            if(nama === ""){
                err.textContent = "Nama anda tidak boleh kosong!";
                return;
            }
            if(jumlah === "" || isNaN(parseInt(jumlah)) || parseInt(jumlah) < 1){
                err.textContent = "Jumlah Pilihan harus berupa angka dan minimal 1!";
                return;
            }

            err.textContent = "";
            dataNama = nama;
            dataJumlah = parseInt(jumlah);

            //buat input pilihan secara dinamis melakukan loop sebanyak dataJumlah
            var container = document.getElementById("container-pilihan");
            container.innerHTML = "";

            for(var i = 1; i <= dataJumlah; i++) {
                var div = document.createElement("div");
                div.className = "row";

                var label = document.createElement("label");
                label.textContent = "Pilihan " + i + " :";

                var input = document.createElement("input");
                input.type = "text";
                input.id = "pilihan -"+i;
                input.placeholder = "Teks Pilihan "+i;

                div.appendChild(label);
                div.appendChild(input);
                container.appendChild(div);
            }

            //tampilkan step 2
            document.getElementById("step2").classList.remove("hidden");
        }

        //Step2 kumpulan teks pilihan, buat radio dan dropdown
        function okStep2() {
            var err = document.getElementById("err-step2");
            arrayPilihan = [];

            //loop ambil semua nilai input pilihan
            for(var i = 1; i <= dataJumlah; i++){
                var val = document.getElementById("pilihan -"+i).value.trim();

                //error trapping
                if(val===""){
                    err.textContent = "Pilihan "+ i + " belum diisi!";
                    return;
                }

                arrayPilihan.push(val); //simpan ke array
            }

            err.textContent = "";

            //isi radio button dari array
            var containerRadio = document.getElementById("container-radio");
            containerRadio.innerHTML = "";

            for(var i = 0; i < arrayPilihan.length; i++) {
                var label = document.createElement("label");
                var radio = document.createElement("input");
                radio.type = "radio";
                radio.name = "pilihan-radio";
                radio.value = arrayPilihan[i];
                if(i===0) radio.checked = true; //default pilih yang pertama

                label.appendChild(radio);
                label.appendChild(document.createTextNode(" " + arrayPilihan[i]));
                containerRadio.appendChild(label);
            }

            //isi dropdown dari array
            var select = document.getElementById("select-pilihan");
            select.innerHTML = "";

            for(var i = 0; i < arrayPilihan.length; i++){
                var option = document.createElement("option");
                option.value = arrayPilihano[i];
                option.textContent = arrayPilihan[i];
                select.appendChild(option);
            }

            //tampilkan step 3
            document.getElementById("step3".classList.remove("hidden"));
        }

        
    </script>
</body>
</html>
