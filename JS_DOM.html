<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas 4 - JavaScript</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 550px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .header{
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header img{
            width: 60px; 
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #aaa;
        }

        /*setiap step dibungkus dalam section*/
        .step{
            border: 1px solid #ccc;
            padding: 16px;
            margin-bottom: 16px;
        }

        /*baris label dan input*/
        .row{
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }
    </style>
</head>
<body>
    <!-----HEADER IDENTITAS-------->
    
</body>
</html>
